name: Bug Report
description: Report a bug or unexpected behavior.
title: "[Bug]: "
labels: ["bug", "triage"]
assignees:
  - NWarila

body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions to reproduce the issue.
      placeholder: |
        1. Run `packer build ...`
        2. Observe error in ...
    validations:
      required: true

  - type: textarea
    id: error-output
    attributes:
      label: Error Output
      description: Paste any relevant error output or logs.
      render: shell

  - type: input
    id: packer-version
    attributes:
      label: Packer Version
      placeholder: "1.12.0"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "Rocky Linux 9.6 / Ubuntu 24.04 / Windows 11"
    validations:
      required: true

  - type: input
    id: proxmox-version
    attributes:
      label: Proxmox VE Version
      placeholder: "8.3"

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Any other context about the problem.
